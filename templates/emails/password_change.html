<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Password Changed</title>
    <style>
        body {
            font-family: 'Ubuntu', Arial, sans-serif;
            background: #F8FAFC;
            margin: 0;
            padding: 0;
        }

        .wrapper {
            max-width: 560px;
            margin: 40px auto;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.07);
            overflow: hidden;
        }

        .header {
            background: #7C3AED;
            padding: 28px 32px;
        }

        .header h1 {
            color: #fff;
            margin: 0;
            font-size: 20px;
            font-weight: 700;
        }

        .body {
            padding: 32px 40px;
        }

        .body p {
            color: #374151;
            line-height: 1.7;
            font-size: 15px;
            margin: 0 0 12px;
        }

        .alert {
            background: #FEF3C7;
            border-left: 4px solid #F59E0B;
            border-radius: 8px;
            padding: 14px 18px;
            margin: 20px 0;
            font-size: 14px;
            color: #92400E;
        }

        .footer {
            padding: 20px 40px;
            border-top: 1px solid #F1F5F9;
            text-align: center;
        }

        .footer p {
            color: #9CA3AF;
            font-size: 12px;
            margin: 0;
        }
    </style>
</head>

<body>
    <div class="wrapper">
        <div class="header">
            <h1>🔑 Password Changed</h1>
        </div>
        <div class="body">
            <p>Hi <strong>{{ user.display_name }}</strong>,</p>
            <p>Your EscrowMarket account password was successfully changed.</p>
            <div class="alert">
                ⚠️ If you did NOT make this change, <a href="{{ frontend_url }}/support">contact support
                    immediately</a>.
            </div>
            <p>If this was you, no further action is needed.</p>
        </div>
        <div class="footer">
            <p>EscrowMarket Security · escrowmarket.com</p>
        </div>
    </div>
</body>

</html>
